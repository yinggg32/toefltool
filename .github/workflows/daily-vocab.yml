name: Daily Vocab Update

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-vocab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's vocabulary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-vocab.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Daily vocab update"
          file_pattern: data/*.json
