name: Daily Vocab Update

on:
  schedule:
    # 23:00 UTC = 07:00 Taiwan time (UTC+8) the next day.
    # Change this if you want a different time — use https://crontab.guru to check.
    - cron: '0 23 * * *'
  workflow_dispatch: {}   # lets you click "Run workflow" manually on GitHub to test it

permissions:
  contents: write   # needed so the workflow can commit the updated JSON back to the repo

jobs:
  update-vocab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's vocabulary
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-vocab.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Daily vocab update"
          file_pattern: data/*.json
